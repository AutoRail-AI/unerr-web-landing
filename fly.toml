app = "unerr-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  # NEXT_PUBLIC_* vars must be set here (not Fly secrets) because
  # Next.js inlines them into client bundles at build time.
  # For Docker builds, these are read from fly.toml during `flyctl deploy`.
  NEXT_PUBLIC_APP_URL = "https://unerr.dev"
  NEXT_PUBLIC_UNERR_APP_SERVER = "https://app.unerr.dev"
  NEXT_PUBLIC_SUPABASE_URL = "https://xodnslpjdqrbtuwxgvnc.supabase.co"
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY = "sb_publishable_GX49Hy76_dPcnRN3khVU7Q_eOFgdTNr"
  NEXT_PUBLIC_POSTHOG_KEY = "phc_pZg2bxydxzEwL5UWMzxi6kvkAxr9gkTytTCA5FWuaS4u"
  NEXT_PUBLIC_POSTHOG_HOST = "https://us.i.posthog.com"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
