name: CI & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ── Job 1: Lint, typecheck, test ──
  test:
    name: Test
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test

  # ── Job 2: Build Docker image & push to Fly registry (main only) ──
  build:
    name: Build & Push Image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version tag
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.0.0")
          SHA="${GITHUB_SHA:0:7}"
          TAG="${VERSION}-${SHA}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Authenticate with Fly registry
        run: flyctl auth docker
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push to Fly registry
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            registry.fly.io/unerr-web:${{ steps.meta.outputs.version }}
            registry.fly.io/unerr-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build summary
        run: |
          echo "### Build Complete :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`registry.fly.io/unerr-web:${{ steps.meta.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${GITHUB_SHA:0:7}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Actor** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> Waiting for manual approval to deploy..." >> "$GITHUB_STEP_SUMMARY"

  # ── Job 3: Deploy to Fly.io (manual approval via environment protection) ──
  deploy:
    name: Deploy to Fly.io
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy image to Fly.io
        run: |
          flyctl deploy \
            --image "registry.fly.io/unerr-web:${{ needs.build.outputs.image_tag }}" \
            --strategy rolling \
            --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment health
        run: flyctl status --app unerr-web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy summary
        run: |
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Key | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ needs.build.outputs.image_tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App** | [unerr-web](https://unerr.dev) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Deployed by** | ${{ github.actor }} |" >> "$GITHUB_STEP_SUMMARY"
